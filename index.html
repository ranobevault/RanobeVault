<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanobeVault — Light Novel Library</title>
<link rel="apple-touch-icon" sizes="180x180" href="favicons/light/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicons/light/favicon-32x32.png" id="favicon-32">
<link rel="icon" type="image/png" sizes="16x16" href="favicons/light/favicon-16x16.png" id="favicon-16">
<link rel="manifest" href="site.webmanifest">
<script>
  (function () {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    function applyFavicon(dark) {
      var base = dark ? 'favicons/dark/' : 'favicons/light/';
      document.getElementById('favicon-32').href = base + 'favicon-32x32.png';
      document.getElementById('favicon-16').href = base + 'favicon-16x16.png';
    }
    applyFavicon(mq.matches);
    mq.addEventListener('change', function (e) { applyFavicon(e.matches); });
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d12;
    --bg2: #13131c;
    --bg3: #1a1a28;
    --surface: #1e1e2e;
    --surface2: #252538;
    --border: #2e2e45;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #e8e6f0;
    --text2: #a09dbb;
    --text3: #6b6884;
    --red: #e05c6a;
    --green: #5ce0a0;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,18,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; gap: 16px;
    height: 56px;
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-decoration: none;
    white-space: nowrap;
  }
  .nav-search {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .nav-search:focus-within { border-color: var(--accent); }
  .nav-search input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Lato', sans-serif;
    font-size: 0.9rem; padding: 8px 0;
  }
  .nav-search input::placeholder { color: var(--text3); }
  .nav-search svg { color: var(--text3); flex-shrink: 0; }
  .nav-actions { display: flex; gap: 8px; }
  .nav-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px;
    padding: 6px 14px; font-family: 'Lato', sans-serif;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    text-decoration: none; white-space: nowrap;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.admin { background: var(--accent); color: #1a1410; border-color: var(--accent); font-weight: 700; }
  .nav-btn.admin:hover { background: var(--accent2); }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--bg) 0%, #1a1428 50%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .hero p {
    color: var(--text2);
    font-size: 0.95rem;
    letter-spacing: 0.02em;
  }

  /* GENRE PILLS */
  .genre-bar {
    padding: 14px 20px;
    display: flex; gap: 8px; overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .genre-bar::-webkit-scrollbar { display: none; }
  .genre-pill {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); border-radius: 20px;
    padding: 5px 14px; font-size: 0.82rem; cursor: pointer;
    white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  }
  .genre-pill:hover, .genre-pill.active {
    background: var(--accent); color: #1a1410;
    border-color: var(--accent); font-weight: 700;
  }

  /* SECTIONS */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem; font-weight: 600;
    color: var(--accent); letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    display: block; width: 3px; height: 16px;
    background: var(--accent); border-radius: 2px;
  }
  .see-all {
    font-size: 0.8rem; color: var(--text3);
    text-decoration: none; transition: color 0.2s;
  }
  .see-all:hover { color: var(--accent); }

  /* UPDATE STRIP */
  .update-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 36px; }
  .update-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    text-decoration: none; transition: all 0.2s;
    cursor: pointer;
  }
  .update-card:hover { border-color: var(--accent); transform: translateX(2px); }
  .update-thumb {
    width: 36px; height: 50px; border-radius: 5px;
    object-fit: cover; flex-shrink: 0;
    background: var(--bg3);
  }
  .update-info { flex: 1; min-width: 0; }
  .update-title { font-weight: 700; font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .update-sub { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }
  .update-time { font-size: 0.72rem; color: var(--text3); white-space: nowrap; flex-shrink: 0; }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }
  @media (min-width: 600px) {
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
  .novel-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    text-decoration: none; display: block;
    transition: all 0.22s; cursor: pointer;
  }
  .novel-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  .card-cover {
    width: 100%; aspect-ratio: 5/7;
    object-fit: cover; background: var(--bg3);
    display: block;
  }
  .card-body { padding: 10px; }
  .card-title { font-size: 0.85rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { font-size: 0.72rem; color: var(--text3); }
  .card-genre { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .badge { background: var(--bg3); color: var(--text3); border-radius: 4px; padding: 2px 6px; font-size: 0.68rem; }
  .badge.new { background: rgba(200,169,110,0.15); color: var(--accent); }

  /* SEARCH RESULTS */
  #search-results { display: none; margin-bottom: 36px; }
  #search-results.active { display: block; }

  /* EMPTY / LOADING */
  .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 0.9rem; }
  .dot-anim::after { content: ''; animation: dots 1.2s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

  .empty { text-align: center; padding: 32px; color: var(--text3); font-size: 0.88rem; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px;
    text-align: center;
    color: var(--text3);
    font-size: 0.8rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
  .logo-img { width:28px;height:28px;object-fit:contain;vertical-align:middle;margin-right:4px }
  .hero-logo { width:90px;height:90px;object-fit:contain;margin-bottom:8px;filter:drop-shadow(0 2px 8px rgba(200,169,110,.3)) }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><img src="favicons/light/android-chrome-192x192.png" class="logo-img" alt="RV"> RanobeVault</a>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search novels...">
  </div>
  <div class="nav-actions">
  </div>
</nav>

<div class="hero">
  <img src="favicons/light/android-chrome-512x512.png" class="hero-logo" alt="RanobeVault">
  <h1>RanobeVault</h1>
  <p>Your sanctuary for light novels</p>
</div>

<div class="genre-bar" id="genre-bar">
  <span class="genre-pill active" data-genre="all">All</span>
</div>

<div class="main">

  <!-- SEARCH RESULTS -->
  <div id="search-results">
    <div class="section-header">
      <span class="section-title">Search Results</span>
    </div>
    <div class="card-grid" id="search-grid"></div>
  </div>

  <!-- RECENTLY UPDATED -->
  <div class="section-header">
    <span class="section-title">Recently Updated</span>
  </div>
  <div class="update-list" id="update-list">
    <div class="loading dot-anim">Loading</div>
  </div>

  <!-- ALL SERIES -->
  <div class="section-header">
    <span class="section-title">All Series</span>
  </div>
  <div class="card-grid" id="series-grid">
    <div class="loading dot-anim" style="grid-column:1/-1">Loading</div>
  </div>

</div>

<footer>
  <p>RanobeVault &mdash; Static Novel Platform</p>
</footer>

<script>
const BASE = '';
let allSeries = [];
let activeGenre = 'all';

function timeAgo(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function renderCard(s) {
  return `<a class="novel-card" href="series.html?id=${s.id}">
    <img class="card-cover" src="${s.cover}" alt="${s.title}" loading="lazy" onerror="this.style.background='#252538'">
    <div class="card-body">
      <div class="card-title">${s.title}</div>
      <div class="card-meta">Ch. ${s.latest_chapter} &bull; Vol. ${s.latest_volume}</div>
      <div class="card-genre">${(s.genres||[]).slice(0,2).map(g=>`<span class="badge">${g}</span>`).join('')}</div>
    </div>
  </a>`;
}

async function loadSeries() {
  try {
    const r = await fetch('data/series.json');
    allSeries = await r.json();

    // Genre pills
    const genres = [...new Set(allSeries.flatMap(s => s.genres || []))];
    const bar = document.getElementById('genre-bar');
    genres.forEach(g => {
      const pill = document.createElement('span');
      pill.className = 'genre-pill';
      pill.dataset.genre = g;
      pill.textContent = g;
      pill.onclick = () => filterGenre(g, pill);
      bar.appendChild(pill);
    });

    renderSeriesGrid(allSeries);
  } catch(e) {
    document.getElementById('series-grid').innerHTML = '<div class="empty">Failed to load series.</div>';
  }
}

function renderSeriesGrid(series) {
  const grid = document.getElementById('series-grid');
  if (!series.length) { grid.innerHTML = '<div class="empty">No series found.</div>'; return; }
  grid.innerHTML = series.map(renderCard).join('');
}

function filterGenre(genre, el) {
  activeGenre = genre;
  document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const filtered = genre === 'all' ? allSeries : allSeries.filter(s => (s.genres||[]).includes(genre));
  renderSeriesGrid(filtered);
}

document.querySelector('[data-genre="all"]').onclick = function() { filterGenre('all', this); };

async function loadUpdates() {
  try {
    const r = await fetch('data/update.json');
    const updates = await r.json();
    const list = document.getElementById('update-list');
    list.innerHTML = updates.slice(0,6).map(u => `
      <a class="update-card" href="${u.url.replace(/^\//, '')}">
        <img class="update-thumb" src="${u.cover||''}" alt="${u.title}" onerror="this.style.background='#252538'" loading="lazy">
        <div class="update-info">
          <div class="update-title">${u.title}</div>
          <div class="update-sub">${u.reason}</div>
        </div>
        <div class="update-time">${timeAgo(u.timestamp)}</div>
      </a>
    `).join('');
  } catch(e) {
    document.getElementById('update-list').innerHTML = '<div class="empty">No updates yet.</div>';
  }
}

// Search
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim().toLowerCase();
  searchTimer = setTimeout(() => {
    const results = document.getElementById('search-results');
    const grid = document.getElementById('search-grid');
    if (!q) {
      results.classList.remove('active');
      return;
    }
    const matches = allSeries.filter(s =>
      s.title.toLowerCase().includes(q) ||
      (s.genres||[]).some(g => g.toLowerCase().includes(q)) ||
      (s.synopsis||'').toLowerCase().includes(q)
    );
    results.classList.add('active');
    grid.innerHTML = matches.length ? matches.map(renderCard).join('') : '<div class="empty">No results found.</div>';
  }, 200);
});

loadSeries();
loadUpdates();
</script>
</body>
</html>
